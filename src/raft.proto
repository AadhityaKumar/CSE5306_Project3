syntax = "proto3";

service RaftService {
    rpc RequestVote (RequestVoteRequest) returns (RequestVoteResponse) {};
    rpc AppendEntries (AppendEntriesRequest) returns (AppendEntriesResponse) {};
    rpc GetLeader (Empty) returns (GetLeaderResponse) {};
    rpc Suspend (SuspendRequest) returns (Empty) {};
    rpc AddNode (AddNodeRequest) returns (AddNodeResponse);
    rpc SendDroneCommand (DroneCommandRequest) returns (DroneCommandResponse);
    rpc ViewLog (LogRequest) returns (LogResponse);
    rpc ResetLeader (LogRequest) returns (LogRequest);

}

message TermCandIDPair {
    int32 term = 1;
    int32 candidateID = 2;
}

message RequestVoteRequest {
    TermCandIDPair candidate = 1;
    int32 lastLogIndex = 2;
    int32 lastLogTerm = 3;
}

message TermResultPair {
    int32 term = 1;
    bool verdict = 2;
}

message RequestVoteResponse {
    TermResultPair result = 1;
}

message TermLeaderIDPair {
    int32 term = 1;
    int32 leaderID = 2;
}

message LogEntry {
    int32 term = 1;
    string command = 2;
    int32 operationIND = 3;
}

message AppendEntriesRequest {
    TermLeaderIDPair leader = 1;
    int32 prevLogIndex = 2;
    int32 prevLogTerm = 3;
    repeated LogEntry entries = 4;
    int32 leaderCommit = 5;
}

message AppendEntriesResponse {
    TermResultPair result = 1;
}

message Empty {}

message GetLeaderResponse {
    int32 nodeId = 1;
    string nodeAddress = 2;
}

message SuspendRequest {
    int32 period = 1;
}

message AddNodeRequest {
    int32 nodeId = 1;
    string nodeAddress = 2;
}

message AddNodeResponse {
    bool success = 1;
    string message = 2;
}

message DroneCommandRequest {
    string command = 1;
}

message DroneCommandResponse {
    bool success = 1;
    string message = 2;
}

message LogRequest {
    int32 ar = 1;
}

message LogEntries {
  string op_command = 1;
  int32 op_term = 2;
  int32 operationIND = 3;
}

message LogResponse {
    repeated LogEntries logs = 1;
}